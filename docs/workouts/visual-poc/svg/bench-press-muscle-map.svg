    <circle class="joint" cx="73" cy="68" r="8"/>
    <circle class="joint" cx="-100" cy="160" r="7"/>
    <circle class="joint" cx="100" cy="160" r="7"/>
    <path class="center" d="M0 58 L0 232"/>
  </g>

  <rect x="62" y="676" width="22" height="22" rx="6" fill="#FF6B35"/>
  <text class="small" x="96" y="694">Primary</text>
  <rect x="222" y="676" width="22" height="22" rx="6" fill="#FFB199"/>
  <text class="small" x="256" y="694">Secondary</text>
  <rect x="430" y="676" width="22" height="22" rx="6" fill="#2B2B2B" stroke="rgba(255,255,255,.22)"/>
  <text class="small" x="464" y="694">Inactive</text>
</svg>

