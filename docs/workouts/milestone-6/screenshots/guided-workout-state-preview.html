<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>TribeLog Guided Workout States</title>
  <style>
    :root {
      --orange: #ff6b35;
      --black: #040404;
      --card: #151515;
      --line: #282828;
      --muted: #a3a3a3;
      --white: #f9f6ef;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--black);
      color: var(--white);
      font-family: "Space Grotesk", Inter, system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      display: grid;
      place-items: center;
    }
    .phone {
      width: 390px;
      height: 844px;
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 6%, rgba(255, 107, 53, 0.22), transparent 28%),
        linear-gradient(180deg, #090909 0%, #040404 100%);
      padding: 34px 22px 24px;
      position: relative;
    }
    .status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      color: #f5f5f5;
      font-weight: 800;
      font-size: 14px;
      margin-bottom: 28px;
    }
    .dots { letter-spacing: 0; color: #dedede; }
    .eyebrow {
      color: var(--orange);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      margin: 0 0 10px;
    }
    h1 {
      font-family: Syne, Inter, system-ui, sans-serif;
      font-size: 36px;
      line-height: 0.98;
      letter-spacing: 0;
      margin: 0 0 12px;
      font-weight: 900;
    }
    .sub {
      color: var(--muted);
      line-height: 1.45;
      font-size: 15px;
      margin: 0 0 22px;
    }
    .card {
      background: rgba(21, 21, 21, 0.95);
      border: 1px solid var(--line);
      border-radius: 8px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.32);
      padding: 16px;
      margin-bottom: 12px;
    }
    .row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    .row > div { min-width: 0; }
    .title {
      font-weight: 900;
      font-size: 17px;
    }
    .meta {
      color: var(--muted);
      font-size: 13px;
      margin-top: 4px;
    }
    .pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      border: 1px solid rgba(255, 107, 53, 0.45);
      background: rgba(255, 107, 53, 0.12);
      color: #ffd8ca;
      border-radius: 999px;
      padding: 8px 11px;
      font-weight: 800;
      font-size: 11px;
      white-space: nowrap;
      flex-shrink: 0;
    }
    .progress {
      height: 8px;
      background: #262626;
      border-radius: 99px;
      overflow: hidden;
      margin-top: 14px;
    }
    .bar {
      height: 100%;
      width: 38%;
      background: linear-gradient(90deg, var(--orange), #ffd21f);
      border-radius: inherit;
    }
    .sets {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-top: 14px;
    }
    .set {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      text-align: center;
      color: var(--muted);
      font-weight: 800;
    }
    .set.done {
      color: #06110a;
      background: #86efac;
      border-color: #86efac;
    }
    .set.active {
      color: var(--white);
      border-color: var(--orange);
      background: rgba(255, 107, 53, 0.14);
    }
    .fields {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 14px;
    }
    .field {
      border: 1px solid var(--line);
      border-radius: 8px;
      padding: 10px;
      background: #0d0d0d;
    }
    .label {
      color: var(--muted);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-weight: 900;
    }
    .value {
      margin-top: 5px;
      font-size: 24px;
      font-weight: 900;
    }
    .timer {
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      border: 1px solid rgba(255, 107, 53, 0.55);
      background: radial-gradient(circle at 50% 20%, rgba(255, 107, 53, 0.28), rgba(255, 107, 53, 0.06));
      border-radius: 8px;
      min-height: 134px;
      margin-top: 14px;
    }
    .timer strong {
      font-size: 46px;
      font-family: Syne, Inter, sans-serif;
    }
    .actions {
      position: absolute;
      left: 22px;
      right: 22px;
      bottom: 24px;
      display: grid;
      gap: 10px;
    }
    .button {
      min-height: 56px;
      border-radius: 8px;
      border: 0;
      background: linear-gradient(90deg, var(--orange), #ffd21f);
      color: #050505;
      font-weight: 950;
      font-size: 16px;
      display: grid;
      place-items: center;
    }
    .button.secondary {
      background: #151515;
      color: var(--white);
      border: 1px solid var(--line);
    }
    .list {
      display: grid;
      gap: 10px;
    }
    .check {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: 1px solid var(--orange);
      display: grid;
      place-items: center;
      color: var(--orange);
      font-weight: 950;
    }
    .warning {
      border-color: rgba(255, 107, 53, 0.65);
      background: rgba(255, 107, 53, 0.1);
    }
    .success {
      display: grid;
      place-items: center;
      width: 92px;
      height: 92px;
      border-radius: 50%;
      background: linear-gradient(135deg, #86efac, #ff6b35);
      color: #050505;
      font-size: 44px;
      margin: 68px auto 28px;
      font-weight: 950;
      box-shadow: 0 0 48px rgba(255, 107, 53, 0.32);
    }
  </style>
</head>
<body>
  <main class="phone" id="app"></main>
  <script>
    const state = new URLSearchParams(location.search).get("state") || "selecting";
    const app = document.getElementById("app");
    const status = `<div class="status"><span>9:41</span><span class="dots">5G 100%</span></div>`;
    const exercises = [
      ["Goblet Squat", "Quads, glutes", "3 sets"],
      ["Push-Up", "Chest, triceps", "3 sets"],
      ["Plank", "Core", "3 sets"]
    ];
    function selecting() {
      return `${status}
        <p class="eyebrow">Guided workout</p>
        <h1>Build today's session.</h1>
        <p class="sub">Pick a few exercises from the tribe catalog. TribeLog keeps the logger fast and gives you structure when you want it.</p>
        <section class="list">
          ${exercises.map((item, index) => `
            <div class="card row">
              <div>
                <div class="title">${item[0]}</div>
                <div class="meta">${item[1]} • ${item[2]}</div>
              </div>
              <div class="check">${index < 2 ? "✓" : ""}</div>
            </div>`).join("")}
        </section>
        <div class="actions">
          <div class="button">Start workout</div>
          <div class="button secondary">Quick log instead</div>
        </div>`;
    }
    function active() {
      return `${status}
        <p class="eyebrow">Active workout</p>
        <h1>Goblet Squat</h1>
        <p class="sub">Set 2 of 3. Keep the reps clean, then let the timer handle your next rest.</p>
        <section class="card">
          <div class="row">
            <div>
              <div class="title">3 exercise workout</div>
              <div class="meta">4 of 9 sets complete • 2,400 kg volume</div>
            </div>
            <span class="pill">Private</span>
          </div>
          <div class="progress"><div class="bar"></div></div>
          <div class="sets"><div class="set done">1</div><div class="set active">2</div><div class="set">3</div></div>
          <div class="fields">
            <div class="field"><div class="label">Reps</div><div class="value">10</div></div>
            <div class="field"><div class="label">Weight</div><div class="value">20 kg</div></div>
          </div>
          <div class="timer"><span class="label">Rest timer</span><strong>0:42</strong></div>
        </section>
        <div class="actions">
          <div class="button">Complete set</div>
          <div class="button secondary">Discard workout</div>
        </div>`;
    }
    function pending() {
      return `${status}
        <p class="eyebrow">Pending sync</p>
        <h1>Workout saved locally.</h1>
        <p class="sub">The session is complete. TribeLog will retry when the backend connection is available.</p>
        <section class="card warning">
          <div class="title">3 exercise workout</div>
          <div class="meta">9 sets • 38 min • 5,860 kg volume</div>
          <div class="progress"><div class="bar" style="width:100%"></div></div>
          <p class="meta">Finish payload is stored locally with exercise asset snapshots.</p>
        </section>
        <div class="actions">
          <div class="button">Retry sync</div>
          <div class="button secondary">Back to workouts</div>
        </div>`;
    }
    function finished() {
      return `${status}
        <div class="success">✓</div>
        <p class="eyebrow" style="text-align:center">Workout complete</p>
        <h1 style="text-align:center">Logged to TribeLog.</h1>
        <p class="sub" style="text-align:center">9 sets completed, 5,860 kg moved, and your workout is ready for the tribe feed.</p>
        <section class="card">
          <div class="row"><span class="meta">Duration</span><strong>38 min</strong></div>
          <div class="row"><span class="meta">Sets</span><strong>9 / 9</strong></div>
          <div class="row"><span class="meta">Points</span><strong>+76 pts</strong></div>
        </section>
        <div class="actions">
          <div class="button">Start another</div>
          <div class="button secondary">View history</div>
        </div>`;
    }
    app.innerHTML = { selecting, active, pending, finished }[state]();
  </script>
</body>
</html>
